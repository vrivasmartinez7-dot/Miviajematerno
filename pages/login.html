<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

  <title>Login | Mi Viaje Materno</title>

  <link rel="stylesheet"
        href="../css/login.css">

</head>

<body class="login-body">

  <div class="login-container">

    <div class="login-card">

      <div class="login-logo">
        🤍
      </div>

      <h2 class="login-title">
        Bienvenida
      </h2>

      <p class="login-subtitle">
        Ingresa a tu cuenta
      </p>

      <form id="login-form">

        <div class="input-group">

          <label for="login-email">
            Correo electrónico
          </label>

          <input
            type="email"
            id="login-email"
            placeholder="Ingresa tu correo"
            required>

        </div>

        <div class="input-group">

          <label for="login-password">
            Contraseña
          </label>

          <input
            type="password"
            id="login-password"
            placeholder="Ingresa tu contraseña"
            required>

        </div>

        <button
          type="submit"
          class="login-btn">

          Entrar

        </button>

<p class="forgot-text">
  <a href="#" id="forgot-password-link">¿Olvidaste tu contraseña?</a>
</p>
      </form>

      <p class="register-text">

        ¿No tienes cuenta?

        <a href="register.html">
          Regístrate aquí
        </a>

      </p>

    </div>

  </div>

  <script type="module"
          src="../js/app.js"></script>

</body>

</html>
