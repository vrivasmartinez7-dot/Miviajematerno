<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crear cuenta | Mi viaje materno</title>

  <link rel="stylesheet" href="../css/register.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">

</head>

<body>

<div class="register-container">

  <!-- PANEL IZQUIERDO -->

  <div class="register-left">

    <h1 class="brand-title">
      Mi Viaje<br>
      Materno
    </h1>

    <div class="brand-divider"></div>

    <h2 class="brand-subtitle">
      Comienza tu viaje
    </h2>

    <p class="brand-description">
      Accede a talleres prenatales interactivos,
      seguimiento gestacional y contenidos
      diseñados para acompañarte durante
      tu embarazo.
    </p>

  </div>

  <!-- PANEL DERECHO -->

  <div class="register-right">

    <div class="form-card">

      <div class="form-header">

        <div class="form-icon">
  ♡
</div>

        <h2 class="form-title">
          Crear cuenta
        </h2>

        <p class="form-subtitle">
          Completa tus datos para comenzar
        </p>

      </div>

      <!-- FORMULARIO -->

      <form id="register-form">

        <!-- FILA 1 -->

        <div class="form-row">

          <div class="form-group">

            <label for="name">
              Nombre completo
            </label>

            <input
              type="text"
              id="name"
              placeholder="Ej: María Fernanda López"
              required>

          </div>

          <div class="form-group">

            <label for="rut">
              RUT
            </label>

            <input
              type="text"
              id="rut"
              placeholder="Ej: 12.345.678-9"
              required>

          </div>

        </div>

        <!-- CORREO -->

        <div class="form-group">

          <label for="email">
            Correo electrónico
          </label>

          <input
            type="email"
            id="email"
            placeholder="Ej: maria@correo.com"
            required>

        </div>

        <!-- CONTRASEÑA -->

        <div class="form-group">

          <label for="password">
            Contraseña
          </label>

          <input
            type="password"
            id="password"
            placeholder="Crea una contraseña segura"
            required>

        </div>

        <!-- FILA 2 -->

        <div class="form-row">

          <div class="form-group">

            <label for="fur">
              FUR (Fecha Última Regla)
            </label>

            <input
              type="date"
              id="fur"
              required>

          </div>

          <div class="form-group">

            <label for="cesfam">
              Sector del CESFAM
            </label>

            <select id="cesfam" required>

              <option value="">
                Selecciona tu sector
              </option>

              <option value="Canelo">
                Canelo
              </option>

              <option value="Araucaria">
                Araucaria
              </option>

              <option value="Roble">
                Roble
              </option>

              <option value="Arrayán">
                Arrayán
              </option>

              <option value="Los Alerce">
                Los Alerce
              </option>

            </select>

          </div>

        </div>

        <!-- CONFIRMAR -->

        <div class="form-group">

          <label for="confirm-password">
            Confirmar contraseña
          </label>

          <input
            type="password"
            id="confirm-password"
            placeholder="Repite tu contraseña"
            required>

        </div>

        <!-- BOTÓN -->

        <button
          type="submit"
          class="register-btn">

          Crear cuenta

        </button>

      </form>

      <!-- LOGIN -->

      <div class="login-link">

        ¿Ya tienes cuenta?

        <a href="login.html">
          Iniciar sesión →
        </a>

      </div>

    </div>

  </div>

</div>

<script type="module" src="../js/app.js"></script>

</body>
</html>
